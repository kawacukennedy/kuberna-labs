name: Publish SDK to npm

on:
  push:
    branches: [main]
    paths:
      - 'sdk/src/**'
      - 'sdk/package.json'
      - 'sdk/tsconfig.json'
  workflow_dispatch:

jobs:
  publish:
    name: Build & Publish @kuberna/sdk
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sdk/package-lock.json
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci
        working-directory: sdk

      - name: Run tests
        run: npm test
        working-directory: sdk

      - name: Build
        run: npm run build
        working-directory: sdk

      - name: Check version against registry
        id: check
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          REGISTRY_VERSION=$(npm view @kuberna/sdk version 2>/dev/null || echo "0.0.0")
          echo "package_version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT
          echo "registry_version=$REGISTRY_VERSION" >> $GITHUB_OUTPUT
          if [ "$PACKAGE_VERSION" != "$REGISTRY_VERSION" ]; then
            echo "needs_publish=true" >> $GITHUB_OUTPUT
          else
            echo "needs_publish=false" >> $GITHUB_OUTPUT
          fi
        working-directory: sdk

      - name: Publish to npm
        if: steps.check.outputs.needs_publish == 'true'
        run: npm publish --provenance --access public
        working-directory: sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
