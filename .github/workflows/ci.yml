name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint
        env:
          ESLINT_USE_FLAT_CONFIG: "false"

      - name: Run Prettier
        run: npm run format:check

      - name: Run Solhint
        run: npx solhint 'contracts/**/*.sol'

  test-contracts:
    name: Test Smart Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Compile contracts
        run: npx hardhat compile

      - name: Run contract tests
        run: npx hardhat test

      - name: Generate coverage report
        run: npx hardhat coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          flags: contracts
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  test-backend:
    name: Test Backend Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run backend tests
        run: |
          cd backend
          npm test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./backend/coverage/lcov.info
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  test-sdk:
    name: Test SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run SDK tests
        run: |
          cd sdk
          npm test

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run npm audit
        run: npm audit --audit-level=moderate || true
        continue-on-error: true

      - name: Run Slither (Smart Contract Security)
        uses: crytic/slither-action@v0.3.0
        continue-on-error: true
        with:
          target: 'contracts/'
          slither-args: '--filter-paths "node_modules|test"'

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test-contracts, test-backend, test-sdk, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build contracts
        run: npx hardhat compile

      - name: Build backend
        run: |
          cd backend
          npm run build

      - name: Build SDK
        run: |
          cd sdk
          npm run build

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Collect git stats
        id: git-stats
        run: |
          echo "commit_msg=$(git log -1 --format='%s' HEAD)" >> $GITHUB_OUTPUT
          echo "commit_author=$(git log -1 --format='%an' HEAD)" >> $GITHUB_OUTPUT
          echo "commit_timestamp=$(git log -1 --format='%aI' HEAD)" >> $GITHUB_OUTPUT
          echo "files_changed=$(git diff --stat HEAD~1..HEAD 2>/dev/null | tail -1 | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "insertions=$(git diff --stat HEAD~1..HEAD 2>/dev/null | tail -1 | awk '{print $4}')" >> $GITHUB_OUTPUT
          echo "deletions=$(git diff --stat HEAD~1..HEAD 2>/dev/null | tail -1 | awk '{print $6}')" >> $GITHUB_OUTPUT

      - name: Send Discord notification — build failed
        if: github.ref == 'refs/heads/main' && failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          NOTIFY_TITLE: "❌ Build Failed"
          NOTIFY_DESC: "CI pipeline failed for [${{ github.repository }}@${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})"
          NOTIFY_COMMIT_SHA: ${{ github.sha }}
          NOTIFY_COMMIT_MSG: ${{ steps.git-stats.outputs.commit_msg }}
          NOTIFY_COMMIT_AUTHOR: ${{ steps.git-stats.outputs.commit_author }}
          NOTIFY_BRANCH: ${{ github.ref_name }}
          NOTIFY_FILES_CHANGED: ${{ steps.git-stats.outputs.files_changed }}
          NOTIFY_INSERTIONS: ${{ steps.git-stats.outputs.insertions }}
          NOTIFY_DELETIONS: ${{ steps.git-stats.outputs.deletions }}
          NOTIFY_JOBS: '[]'
          NOTIFY_ENV: "production"
          NOTIFY_VERSION: "1.0.2"
          NOTIFY_CI_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          NOTIFY_DEPLOY_URL: "https://dashboard.render.com/web/srv-d80v019kh4rs73e6072g"
        run: |
          npx ts-node scripts/notify-discord.ts

      - name: Send Discord notification — build succeeded
        if: github.ref == 'refs/heads/main' && success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          NOTIFY_TITLE: "Build Succeeded"
          NOTIFY_DESC: "CI pipeline passed for [${{ github.repository }}@${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})"
          NOTIFY_COMMIT_SHA: ${{ github.sha }}
          NOTIFY_COMMIT_MSG: ${{ steps.git-stats.outputs.commit_msg }}
          NOTIFY_COMMIT_AUTHOR: ${{ steps.git-stats.outputs.commit_author }}
          NOTIFY_COMMIT_TIMESTAMP: ${{ steps.git-stats.outputs.commit_timestamp }}
          NOTIFY_BRANCH: ${{ github.ref_name }}
          NOTIFY_FILES_CHANGED: ${{ steps.git-stats.outputs.files_changed }}
          NOTIFY_INSERTIONS: ${{ steps.git-stats.outputs.insertions }}
          NOTIFY_DELETIONS: ${{ steps.git-stats.outputs.deletions }}
          NOTIFY_FEATURES: ${{ vars.NOTIFY_FEATURES || '[]' }}
          NOTIFY_IMPROVEMENTS: ${{ vars.NOTIFY_IMPROVEMENTS || '[]' }}
          NOTIFY_FIXES: ${{ vars.NOTIFY_FIXES || '[]' }}
          NOTIFY_JOBS: '[{"name":"Lint","status":"success"},{"name":"Contracts","status":"success"},{"name":"Backend","status":"success"},{"name":"SDK","status":"success"},{"name":"Security","status":"success"},{"name":"Frontend","status":"success"},{"name":"Build","status":"success"}]'
          NOTIFY_ENV: "production"
          NOTIFY_VERSION: "1.0.2"
          NOTIFY_APP_URL: "https://kuberna-labs.onrender.com"
          NOTIFY_CI_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          NOTIFY_DEPLOY_URL: "https://dashboard.render.com/web/srv-d80v019kh4rs73e6072g"
          NOTIFY_DURATION: "${{ github.run_duration }}"
        run: |
          npx ts-node scripts/notify-discord.ts

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run TypeScript type check
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Run ESLint
        run: |
          cd frontend
          npm run lint

      - name: Run tests
        run: |
          cd frontend
          npm test -- --passWithNoTests


