# Kuberna Labs - Render Blueprint (Infrastructure as Code)
# One-click deploy configuration for Render
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: kuberna-labs
    env: node
    region: oregon
    plan: starter
    buildCommand: npm run build:all
    startCommand: npm run start:render
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: RPC_URL
        sync: false
      # PRIVATE_KEY is set via Render dashboard secrets — never hardcode or commit
      # Use a dedicated, low-balance deployer wallet for the backend.
      - key: BASE_SEPOLIA_RPC_URL
        sync: false
      - key: ESCROW_CONTRACT_ADDRESS
        sync: false
      - key: INTENT_CONTRACT_ADDRESS
        sync: false
      - key: CERTIFICATE_NFT_CONTRACT_ADDRESS
        sync: false
      - key: PAYMENT_CONTRACT_ADDRESS
        sync: false
      - key: SUBSCRIPTION_CONTRACT_ADDRESS
        sync: false
      - key: REPUTATION_NFT_CONTRACT_ADDRESS
        sync: false
      - key: AGENT_REGISTRY_CONTRACT_ADDRESS
        sync: false
      - key: COURSE_NFT_CONTRACT_ADDRESS
        sync: false
      - key: WORKSHOP_CONTRACT_ADDRESS
        sync: false
      - key: DISPUTE_CONTRACT_ADDRESS
        sync: false
      - key: TREASURY_CONTRACT_ADDRESS
        sync: false
      - key: FEE_MANAGER_CONTRACT_ADDRESS
        sync: false
      - key: ATTESTATION_CONTRACT_ADDRESS
        sync: false
      - key: CROSSCHAIN_ROUTER_CONTRACT_ADDRESS
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_DIST_PATH
        sync: false
      - key: NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID
        sync: false
