<body class="bg-surface font-body text-on-surface min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
<!-- Decorative Background Orbs -->
<div class="absolute top-[-10%] left-[-5%] w-96 h-96 bg-primary-fixed-dim rounded-full mix-blend-multiply filter blur-3xl opacity-30"></div>

</div>

<!-- Email Field -->
<div class="space-y-1">
<label class="text-label-md font-bold uppercase tracking-widest text-on-surface-variant block" for="email">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full bg-surface-container-low border-0 rounded-DEFAULT py-4 pl-12 pr-4 text-body-lg text-on-surface focus:ring-0 focus:bg-surface-container-lowest focus:shadow-[0_0_8px_rgba(70,72,212,0.2)] transition-all" id="email" placeholder="name@domain.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1">
<div class="flex justify-between items-center">
<label class="text-label-md font-bold uppercase tracking-widest text-on-surface-variant block" for="password">Password</label>
<a class="text-xs text-primary hover:text-primary-container font-medium" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full bg-surface-container-low border-0 rounded-DEFAULT py-4 pl-12 pr-4 text-body-lg text-on-surface focus:ring-0 focus:bg-surface-container-lowest focus:shadow-[0_0_8px_rgba(70,72,212,0.2)] transition-all" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Login Button -->
<button class="w-full gradient-bg text-on-primary font-medium py-4 px-6 rounded-DEFAULT btn-spring mt-2 shadow-[0_8px_16px_rgba(70,72,212,0.2)]" type="submit">
                        Log In
                    </button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 my-8">
<div class="h-px bg-surface-container-high flex-1"></div>
<span class="text-xs font-medium text-outline uppercase tracking-wider">Or</span>
<div class="h-px bg-surface-container-high flex-1"></div>
</div>
<!-- Web3 Connect -->
<button class="w-full bg-surface-container-low text-on-surface font-medium py-4 px-6 rounded-DEFAULT btn-spring mb-4 hover:bg-surface-container-highest transition-colors flex items-center justify-center gap-2" type="button">
<span class="material-symbols-outlined text-secondary">wallet</span>
                    Connect Wallet
                </button>
<!-- OAuth Options -->
<div class="grid grid-cols-3 gap-4">
<button class="bg-surface-container-low py-3 rounded-DEFAULT hover:bg-surface-container-highest transition-colors flex justify-center btn-spring" type="button">
